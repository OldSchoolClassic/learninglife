
## `_config.yml`

```yml
# ============================================================
# Learning Life, Jekyll / GitHub Pages
# ============================================================

title: "Learning Life"
description: "PA homeschool evaluations, IEP support, graduation guidance, tutoring, and homeschool resources with Alona Cortes."
url: "https://learninglife.us"
baseurl: ""

author:
  name: "Alona Cortes"
  email: "alonacortes@gmail.com"

permalink: /:name/

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

sitemap:
  filename: sitemap.xml

feed:
  path: feed.xml

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - "*.zip"
  - "*.txt"
  - node_modules/
  - .DS_Store
