# ============================================================
# Learning Life, Jekyll / GitHub Pages
# ============================================================

title: "Learning Life"
description: "PA homeschool evaluations, IEP support, graduation guidance, and curriculum resources, with Alona Cortes, certified teacher and homeschooling mom."
url: "https://learninglife.us"
baseurl: ""

author:
  name: Alona Cortes
  email: alonacortes@gmail.com

permalink: /:name/

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

sitemap:
  filename: sitemap.xml

feed:
  path: feed.xml

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - "*.zip"
  - "*.txt"
  - node_modules/
  - .DS_Store
